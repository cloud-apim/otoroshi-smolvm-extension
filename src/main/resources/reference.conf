otoroshi {
  admin-extensions {
    configurations {
      # key = AdminExtensionId("cloud-apim.extensions.SmolMachine").cleanup
      cloud-apim_extensions_smolmachine {
        enabled = true
        enabled = ${?CLOUD_APIM_EXTENSIONS_SMOLMACHINE_ENABLED}
        # external state (instance -> host placement registry) used to make the
        # lazy instance pool cluster-safe. redis uri (standalone). if empty, the
        # extension falls back to otoroshi's own datastore redis (env.datastores.redis).
        state {
          uri = ${?CLOUD_APIM_EXTENSIONS_SMOLMACHINE_STATE_URI}
        }
        # idle/orphan instances garbage collector (runs on the cluster leader only)
        reaper {
          enabled = true
          enabled = ${?CLOUD_APIM_EXTENSIONS_SMOLMACHINE_REAPER_ENABLED}
          interval-ms = 30000
          interval-ms = ${?CLOUD_APIM_EXTENSIONS_SMOLMACHINE_REAPER_INTERVAL_MS}
        }
      }
    }
  }
}
